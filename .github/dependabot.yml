# 🧱 LEGO Dependabot Configuration
# Routine version-update PRs are disabled (open-pull-requests-limit: 0).
# The weekly digest at .github/workflows/weekly-security-report.yml is the
# source of truth for routine bumps.
# Security-update PRs (CVE response) still flow — they are a separate
# Dependabot mode controlled at Settings → Code security → Dependabot
# security updates (toggle stays ON).

version: 2
updates:
  # 🐍 Python backend dependencies
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "21:12"
      timezone: "Europe/Copenhagen"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "python"
      - "backend"
    commit-message:
      prefix: "🧱"
      include: "scope"

  # ⚛️ Frontend npm dependencies
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "21:12"
      timezone: "Europe/Copenhagen"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "npm"
      - "frontend"
    commit-message:
      prefix: "🧱"
      include: "scope"

  # 🐳 Docker base images
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "21:12"
      timezone: "Europe/Copenhagen"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "🧱"
      include: "scope"

  # 🔧 GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "21:12"
      timezone: "Europe/Copenhagen"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "🧱"
      include: "scope"
