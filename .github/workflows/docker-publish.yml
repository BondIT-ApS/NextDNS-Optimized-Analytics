name: 🚀 LEGO Production Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  # 🔍 LEGO Changed Brick Discovery
  detect-changes:
    name: 🔍 LEGO Changed Brick Discovery
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      any-service: ${{ steps.filter.outputs.frontend == 'true' || steps.filter.outputs.backend == 'true' }}
    steps:
      - name: 📎 Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2  # Need at least 2 commits to compare

      - name: 🔍 Detect Changed LEGO Bricks
        id: filter
        run: |
          # Get changed files from last commit (main branch push)
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "FORCE_ALL")
          echo "Changed files: $CHANGED_FILES"

          # Fallback: if no previous commit or error, build everything
          if [ "$CHANGED_FILES" = "FORCE_ALL" ]; then
            echo "⚠️  Unable to detect changes (first commit or error), building all services"
            echo "frontend=true" >> "$GITHUB_OUTPUT"
            echo "backend=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check if frontend changed
          if echo "$CHANGED_FILES" | grep -E '^(frontend/|Dockerfile\.frontend|docker-compose\.yml)' > /dev/null; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
            echo "🧱 Frontend changes detected"
          else
            echo "frontend=false" >> "$GITHUB_OUTPUT"
            echo "⏭️  No frontend changes"
          fi

          # Check if backend changed
          if echo "$CHANGED_FILES" | grep -E '^(backend/|Dockerfile\.backend|docker-compose\.yml)' > /dev/null; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
            echo "🧱 Backend changes detected"
          else
            echo "backend=false" >> "$GITHUB_OUTPUT"
            echo "⏭️  No backend changes"
          fi

  # 🧪 Run Tests and Upload Coverage (Before Build)
  test-and-coverage-frontend:
    name: 🧪 Frontend Tests & Coverage Upload
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: 📎 Checkout code
        uses: actions/checkout@v6

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧪 Run tests with coverage
        run: npm run test:coverage

      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./frontend/coverage/lcov.info
          flags: frontend,unittests
          name: nextdns-analytics-frontend-main
          fail_ci_if_error: false
          verbose: true

  test-and-coverage-backend:
    name: 🧪 Backend Tests & Coverage Upload
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'

    steps:
      - name: 📎 Checkout code
        uses: actions/checkout@v6

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt

      - name: 🧪 Run tests with coverage
        run: |
          cd backend
          python -m pytest tests/ --cov=. --cov-report=xml --cov-report=term -v

      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./backend/coverage.xml
          flags: backend,unittests
          name: nextdns-analytics-backend-main
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # 🏷️ Calculate Semantic Version
  calculate-version:
    name: 🏷️ Calculate Semantic Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      year_month: ${{ steps.version.outputs.year_month }}
    steps:
      - name: 📎 Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 🏷️ Calculate version from existing tags
        id: version
        run: |
          # Generate YY.M format from current date
          YEAR_MONTH=$(date +'%y.%-m')
          echo "year_month=${YEAR_MONTH}" >> "$GITHUB_OUTPUT"

          # Find the highest patch number for the current month
          LATEST_PATCH=$(git tag --list "${YEAR_MONTH}.*" | sed "s/${YEAR_MONTH}\.//" | sort -n | tail -1)

          if [ -z "$LATEST_PATCH" ]; then
            PATCH=1
          else
            PATCH=$((LATEST_PATCH + 1))
          fi

          VERSION="${YEAR_MONTH}.${PATCH}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          echo "🏷️ Semantic version: ${VERSION}"
          echo "📅 Year/Month: ${YEAR_MONTH}"
          echo "🔢 Patch: ${PATCH}"

  # 🎯 Generate Dynamic Build Matrix
  generate-matrix:
    name: 🎯 Generate Dynamic LEGO Build Matrix
    runs-on: ubuntu-latest
    needs: detect-changes
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      should-build: ${{ steps.set-matrix.outputs.should-build }}
    steps:
      - name: 📋 Generate build matrix based on changes
        id: set-matrix
        run: |
          SERVICES="[]"

          # Add backend to matrix if changed
          if [ "${{ needs.detect-changes.outputs.backend }}" = "true" ]; then
            SERVICES=$(echo "$SERVICES" | jq -c '. += ["backend"]')
            echo "🧱 Backend added to build matrix"
          fi

          # Add frontend to matrix if changed
          if [ "${{ needs.detect-changes.outputs.frontend }}" = "true" ]; then
            SERVICES=$(echo "$SERVICES" | jq -c '. += ["frontend"]')
            echo "🧱 Frontend added to build matrix"
          fi

          echo "matrix={\"service\":$SERVICES}" >> "$GITHUB_OUTPUT"
          echo "📋 Build matrix: $SERVICES"

          # Set flag if we should build anything
          if [ "$SERVICES" = "[]" ]; then
            echo "should-build=false" >> "$GITHUB_OUTPUT"
            echo "⏭️  No services to build"
          else
            echo "should-build=true" >> "$GITHUB_OUTPUT"
            echo "✅ Build matrix generated"
          fi

  # 🏢 Production LEGO Assembly Line
  production-build:
    name: 🏢 Build Production LEGO Set (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [detect-changes, generate-matrix, calculate-version, test-and-coverage-frontend, test-and-coverage-backend]
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      needs.generate-matrix.outputs.should-build == 'true'

    strategy:
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}

    steps:
      - name: 📎 Get LEGO Instructions (Checkout)
        uses: actions/checkout@v6

      - name: 🌍 Set up Multi-Platform Builder (QEMU)
        uses: docker/setup-qemu-action@v4

      - name: 🔧 Prepare Assembly Line (Docker Buildx)
        uses: docker/setup-buildx-action@v4
        id: buildx

      - name: 🔑 Connect to LEGO Warehouse (Docker Hub)
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏢 Build & Push Semantic Versioned LEGO Set with Attestations
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.${{ matrix.service }}
          push: true
          tags: |
            maboni82/nextdns-optimized-analytics-${{ matrix.service }}:latest
            maboni82/nextdns-optimized-analytics-${{ matrix.service }}:${{ needs.calculate-version.outputs.version }}
            maboni82/nextdns-optimized-analytics-${{ matrix.service }}:${{ needs.calculate-version.outputs.year_month }}
          build-args: |
            APP_VERSION=${{ needs.calculate-version.outputs.version }}
          builder: ${{ steps.buildx.outputs.name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  # 🏷️ Push Version Tag
  push-version-tag:
    name: 🏷️ Push Version Tag
    runs-on: ubuntu-latest
    needs: [calculate-version, production-build]
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    steps:
      - name: 📎 Checkout code
        uses: actions/checkout@v6

      - name: 🏷️ Create and push version tag
        run: |
          VERSION="${{ needs.calculate-version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${VERSION}" -m "🧱 Build ${VERSION}"
          git push origin "${VERSION}"
          echo "🏷️ Pushed tag: ${VERSION}"

      - name: 🚀 Create GitHub Release
        run: |
          VERSION="${{ needs.calculate-version.outputs.version }}"
          gh release create "${VERSION}" \
            --title "Release ${VERSION}" \
            --notes "Automated release ${VERSION}" \
            --latest
          echo "🚀 Created GitHub release: ${VERSION}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  # ─────────────────────────────────────────────────────────────
  # 🚀 BUMP DEV VALUES (inline — public repo cannot call private reusable)
  # ─────────────────────────────────────────────────────────────
  # NextDNS-Optimized-Analytics is a PUBLIC repo. Calling a reusable
  # workflow that lives in a PRIVATE repo (BondIT-ApS/bondit-cloud-gitops)
  # is prohibited by GH — it would leak the private workflow definition.
  # We therefore inline the same steps here. Logic mirrors
  # bondit-cloud-gitops/.github/workflows/tag-bump-dev-values.yml @ main.
  # See BondIT-ApS/bondit-cloud-gitops#241 and
  # docs/tier-c-cross-repo-bump-dev-values.md in that repo.
  bump-dev-values:
    name: "🚀 Bump Dev Values"
    runs-on: ubuntu-latest
    needs: [calculate-version, production-build]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      github.actor != 'dependabot[bot]' &&
      needs.calculate-version.outputs.version != ''
    env:
      NEW_VERSION: ${{ needs.calculate-version.outputs.version }}
      GITOPS_REPO: BondIT-ApS/bondit-cloud-gitops
      VALUES_PATH: charts/nextdns-analytics/values-dev.yaml
    steps:
      - name: "🔑 Configure SSH deploy key"
        env:
          SSH_PRIVATE_KEY: ${{ secrets.BUMP_DEV_VALUES_GITOPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null

      - name: "📦 Checkout bondit-cloud-gitops (main) over SSH"
        uses: actions/checkout@v6
        with:
          repository: ${{ env.GITOPS_REPO }}
          ref: main
          fetch-depth: 1
          ssh-key: ${{ secrets.BUMP_DEV_VALUES_GITOPS_SSH_KEY }}
          persist-credentials: true

      - name: "🔧 Install yq"
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: "📝 Bump frontend.image.tag + backend.image.tag"
        run: |
          if [ ! -f "${VALUES_PATH}" ]; then
            echo "❌ values file not found: ${VALUES_PATH}"
            exit 1
          fi
          yq -i ".frontend.image.tag = \"${NEW_VERSION}\"" "${VALUES_PATH}"
          yq -i ".backend.image.tag  = \"${NEW_VERSION}\"" "${VALUES_PATH}"
          echo "=== diff ==="
          git --no-pager diff "${VALUES_PATH}" || true

      - name: "📤 Commit & push"
        run: |
          if git diff --quiet "${VALUES_PATH}"; then
            echo "✅ No change — tag already at ${NEW_VERSION}. Skipping."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${VALUES_PATH}"
          git commit -m "build: bump dev nextdns-analytics to ${NEW_VERSION} (frontend+backend) [skip ci]"
          for attempt in 1 2 3; do
            if git push origin main; then
              echo "✅ Pushed on attempt $attempt"
              exit 0
            fi
            echo "⚠️  Push attempt $attempt failed — pulling + rebasing"
            git pull --rebase origin main
          done
          echo "❌ Push failed after 3 attempts"
          exit 1
