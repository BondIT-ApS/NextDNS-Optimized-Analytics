name: 🧱 LEGO Quality Gate - PR Validation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write
  security-events: write
  packages: read
  actions: read

jobs:
  # 🔍 Discover changes and post LEGO-themed comment
  discover-changes:
    name: 🔍 Discover LEGO Building Plan
    runs-on: ubuntu-latest
    outputs:
      frontend-changed: ${{ steps.changes.outputs.frontend }}
      backend-changed: ${{ steps.changes.outputs.backend }}
      workflows-changed: ${{ steps.changes.outputs.workflows }}
      lines-changed: ${{ steps.stats.outputs.lines-changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changes
        id: changes
        run: |
          # Get changed files
          CHANGED_FILES=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}")
          echo "Changed files: $CHANGED_FILES"
          
          # Check if frontend changed
          if echo "$CHANGED_FILES" | grep -E '^frontend/' > /dev/null; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=false" >> "$GITHUB_OUTPUT"
          fi
          
          # Check if backend changed
          if echo "$CHANGED_FILES" | grep -E '^backend/' > /dev/null; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend=false" >> "$GITHUB_OUTPUT"
          fi
          
          # Check if workflows changed
          if echo "$CHANGED_FILES" | grep -E '^\.github/workflows/' > /dev/null; then
            echo "workflows=true" >> "$GITHUB_OUTPUT"
          else
            echo "workflows=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Calculate change statistics
        id: stats
        run: |
          # Get diff statistics
          STATS=$(git diff --stat "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}")
          LINES_CHANGED=$(echo "$STATS" | tail -1 | grep -o '[0-9]\+ insertion\|[0-9]\+ deletion' | grep -o '[0-9]\+' | awk '{sum += $1} END {print sum+0}')
          echo "lines-changed=$LINES_CHANGED" >> "$GITHUB_OUTPUT"
          echo "Detected $LINES_CHANGED lines changed"

      - name: 🧱 Post LEGO Building Plan Comment
        uses: actions/github-script@v9
        with:
          script: |
            const linesChanged = ${{ steps.stats.outputs.lines-changed }};
            const frontendChanged = ${{ steps.changes.outputs.frontend }};
            const backendChanged = ${{ steps.changes.outputs.backend }};
            const workflowsChanged = ${{ steps.changes.outputs.workflows }};
            
            // Determine LEGO building complexity
            let complexity = "";
            let emoji = "";
            if (linesChanged < 50) {
              complexity = "Small LEGO kit";
              emoji = "🧱";
            } else if (linesChanged < 200) {
              complexity = "Medium LEGO set";
              emoji = "🏢";
            } else if (linesChanged < 500) {
              complexity = "Large LEGO construction";
              emoji = "🏰";
            } else {
              complexity = "Master Builder project";
              emoji = "🌟";
            }
            
            const changes = [];
            if (frontendChanged) changes.push("Frontend (React/TypeScript)");
            if (backendChanged) changes.push("Backend (FastAPI/Python)");
            if (workflowsChanged) changes.push("GitHub Actions Workflows");
            
            const comment = `## ${emoji} LEGO Quality Gate Analysis
            
            **Building Complexity:** ${complexity} (${linesChanged} lines changed)
            **Components Modified:** ${changes.join(", ") || "Documentation/Config only"}
            
            ### 🚀 Quality Checks Starting...
            The automated quality gates are now running to ensure all LEGO pieces fit together perfectly!
            
            - 🔍 **Linting**: Checking code formatting and style
            - ✨ **Quality**: Running comprehensive code analysis
            - 🛡️ **Security**: Deep vulnerability scanning with Safety Action
            - 🐳 **Build Test**: Verifying Docker containers build successfully
            
            *Like any good LEGO instruction manual, we'll verify each step before moving to the next! 📋*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # 🔍 Frontend Linting (parallel)
  lint-frontend:
    name: 🎨 Lint Frontend (ESLint)
    runs-on: ubuntu-latest
    needs: discover-changes
    if: needs.discover-changes.outputs.frontend-changed == 'true'
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # 🐍 Backend Linting (parallel)
  lint-backend:
    name: 🐍 Lint Backend (Pylint + Black)
    runs-on: ubuntu-latest
    needs: discover-changes
    if: needs.discover-changes.outputs.backend-changed == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt

      - name: Check Black formatting
        run: |
          cd backend
          black . --check --line-length=88 --exclude=alembic

      - name: Run Pylint
        run: |
          export PYTHONPATH=$PYTHONPATH:./backend
          pylint backend --rcfile=.pylintrc

  # 🔧 GitHub Actions Workflow Linting (parallel)
  lint-workflows:
    name: 🔧 Lint GitHub Actions Workflows (actionlint)
    runs-on: ubuntu-latest
    needs: discover-changes
    if: needs.discover-changes.outputs.workflows-changed == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install actionlint
        run: |
          # Download and install actionlint
          bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          sudo mv ./actionlint /usr/local/bin/actionlint
          actionlint --version

      - name: Lint GitHub Actions workflows
        run: |
          echo "🔧 Linting GitHub Actions workflows with actionlint..."
          actionlint -verbose .github/workflows/*
          echo "✅ All workflows passed linting!"

      - name: Post workflow linting results
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const comment = `## ❌ GitHub Actions Workflow Linting Failed
            
            The GitHub Actions workflows have linting issues that need to be fixed.
            
            **What this means:**
            - Workflow syntax errors or best practice violations detected
            - This could cause CI/CD failures in the future
            - All workflows should pass \`actionlint\` validation
            
            **How to fix:**
            1. Run \`actionlint -verbose .github/workflows/*\` locally
            2. Fix any reported issues (syntax errors, shellcheck warnings, etc.)
            3. Commit and push the fixes
            
            **Why we check this:**
            - Prevents workflow failures that break CI/CD
            - Ensures GitHub Actions follow best practices
            - Catches configuration errors before they impact PRs
            
            🧱 *Like LEGO instructions, our workflows need to be perfectly clear and error-free!*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # ✨ Frontend Code Quality (parallel)
  quality-frontend:
    name: ✨ Frontend Quality (TypeScript + Prettier)
    runs-on: ubuntu-latest
    needs: discover-changes
    if: needs.discover-changes.outputs.frontend-changed == 'true'
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check TypeScript
        run: npm run type-check

      - name: Check Prettier formatting
        run: npm run format:check

      - name: Run tests with coverage
        run: npm run test:coverage

  # 🐍 Backend Code Quality (parallel)
  quality-backend:
    name: ✨ Backend Quality (Testing + Security)
    runs-on: ubuntu-latest
    needs: discover-changes
    if: needs.discover-changes.outputs.backend-changed == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov safety bandit

      - name: Security check with bandit
        run: |
          cd backend
          bandit -r . -f json -o bandit-report.json -x tests/ || true

      - name: Dependency security check
        run: safety check

      - name: Run tests with coverage
        run: |
          cd backend
          pip install -r requirements-dev.txt
          python -m pytest tests/ --cov=. --cov-report=xml --cov-report=term -v

  # 🛡️ Safety Action Security Check (parallel)
  safety-security-check:
    name: 🛡️ Deep LEGO Security Scan (Safety Action)
    runs-on: ubuntu-latest
    needs: discover-changes
    if: needs.discover-changes.outputs.backend-changed == 'true'
    
    steps:
      - name: 📎 Get LEGO Security Instructions
        uses: actions/checkout@v6
      
      - name: 🛡️ Run Safety CLI to check for vulnerabilities
        uses: pyupio/safety-action@v1
        with:
          api-key: ${{ secrets.SAFETY_API_KEY }}
          
      - name: 🎯 Safety scan completed
        run: echo "🧱 Safety Action security scan completed successfully!"


  # 🐳 Backend Build Test
  build-test-backend:
    name: 🐳 LEGO Backend Assembly Test (Docker Build)
    runs-on: ubuntu-latest
    needs: [discover-changes, lint-frontend, lint-backend, lint-workflows, quality-frontend, quality-backend, safety-security-check, codecov-upload-backend]
    if: always() && !contains(needs.*.result, 'failure') && needs.discover-changes.outputs.backend-changed == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build backend Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.backend
          push: false
          tags: nextdns-backend:pr-${{ github.event.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 🐳 Frontend Build Test
  build-test-frontend:
    name: 🐳 LEGO Frontend Assembly Test (Docker Build)
    runs-on: ubuntu-latest
    needs: [discover-changes, lint-frontend, lint-backend, lint-workflows, quality-frontend, quality-backend, safety-security-check, codecov-upload-frontend]
    if: always() && !contains(needs.*.result, 'failure') && needs.discover-changes.outputs.frontend-changed == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build frontend Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.frontend
          push: false
          tags: nextdns-frontend:pr-${{ github.event.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 📊 Frontend Codecov Coverage Upload
  codecov-upload-frontend:
    name: 📊 LEGO Code Coverage Report - Frontend (Codecov)
    runs-on: ubuntu-latest
    needs: [discover-changes, quality-frontend]
    if: needs.discover-changes.outputs.frontend-changed == 'true'
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./frontend/coverage/lcov.info
          flags: frontend,unittests
          name: nextdns-analytics-frontend
          fail_ci_if_error: false
          verbose: true

      - name: Check coverage threshold (15% minimum)
        run: |
          # Extract coverage from vitest output
          COVERAGE_OUTPUT=$(npm run test:coverage 2>&1)
          echo "$COVERAGE_OUTPUT"
          
          # Parse coverage percentage (vitest format)
          COVERAGE=$(echo "$COVERAGE_OUTPUT" | grep -E "All files.*\|" | awk '{print $4}' | sed 's/%//' | head -1)
          
          if [ -z "$COVERAGE" ]; then
            echo "⚠️  Could not parse coverage percentage, skipping threshold check"
            exit 0
          fi
          
          echo "📊 Current coverage: ${COVERAGE}%"
          COVERAGE_INT=$(echo "$COVERAGE" | cut -d. -f1)
          
          if [ "$COVERAGE_INT" -lt 15 ]; then
            echo "❌ Coverage ${COVERAGE}% is below minimum threshold of 15%"
            echo "🧱 LEGO Quality Gate: More test coverage needed!"
            exit 1
          else
            echo "✅ Coverage ${COVERAGE}% meets minimum threshold of 15%"
            echo "🧱 LEGO Quality Gate: Test coverage looks good!"
          fi

  # 📊 Backend Codecov Coverage Upload
  codecov-upload-backend:
    name: 📊 LEGO Code Coverage Report - Backend (Codecov)
    runs-on: ubuntu-latest
    needs: [discover-changes, quality-backend]
    if: needs.discover-changes.outputs.backend-changed == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt

      - name: Run tests with coverage
        run: |
          cd backend
          python -m pytest tests/ --cov=. --cov-report=xml --cov-report=term -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./backend/coverage.xml
          flags: backend,unittests
          name: nextdns-analytics-backend
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Check coverage threshold (15% minimum)
        run: |
          # Extract coverage percentage from XML
          cd backend
          COVERAGE=$(python -c "import xml.etree.ElementTree as ET; tree = ET.parse('coverage.xml'); root = tree.getroot(); print(root.attrib['line-rate'])" 2>/dev/null || echo "0")
          COVERAGE_PERCENT=$(python -c "print(int(float($COVERAGE) * 100))" 2>/dev/null || echo "0")
          echo "📊 Current coverage: ${COVERAGE_PERCENT}%"
          
          if [ "$COVERAGE_PERCENT" -lt 15 ]; then
            echo "❌ Coverage ${COVERAGE_PERCENT}% is below minimum threshold of 15%"
            echo "🧱 LEGO Quality Gate: More test coverage needed for backend!"
            exit 1
          else
            echo "✅ Coverage ${COVERAGE_PERCENT}% meets minimum threshold of 15%"
            echo "🧱 LEGO Quality Gate: Backend test coverage looks good!"
          fi

  # 🎭 E2E Tests with Playwright (blocking)
  e2e-tests:
    name: 🎭 LEGO E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [discover-changes, build-test-backend, build-test-frontend]
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      (needs.discover-changes.outputs.frontend-changed == 'true' || needs.discover-changes.outputs.backend-changed == 'true')

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build and start test stack
        run: docker compose -f docker-compose.test.yml up -d --build

      - name: Wait for backend to be healthy
        run: |
          echo "⏳ Waiting for backend to become healthy..."
          for i in $(seq 1 30); do
            CONTAINER=$(docker compose -f docker-compose.test.yml ps -q backend 2>/dev/null)
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$CONTAINER" 2>/dev/null || echo "unknown")
            echo "  attempt $i: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "✅ Backend is healthy"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "❌ Backend never became healthy"
              docker compose -f docker-compose.test.yml logs backend
              exit 1
            fi
            sleep 10
          done

      - name: Wait for frontend to be ready
        run: |
          echo "⏳ Waiting for frontend..."
          for i in $(seq 1 18); do
            if curl -sf http://localhost:5012/ > /dev/null 2>&1; then
              echo "✅ Frontend is ready"
              break
            fi
            echo "  attempt $i: not ready yet"
            if [ "$i" = "18" ]; then
              echo "❌ Frontend never became ready"
              docker compose -f docker-compose.test.yml logs frontend
              exit 1
            fi
            sleep 5
          done

      - name: Seed E2E test data
        run: |
          CONTAINER=$(docker compose -f docker-compose.test.yml ps -q backend)
          docker cp backend/tests/seed_e2e_data.py "$CONTAINER":/tmp/seed_e2e_data.py
          docker exec "$CONTAINER" python /tmp/seed_e2e_data.py

      - name: Verify API returns data before tests
        run: |
          echo "🔍 Checking backend /logs endpoint..."
          RESPONSE=$(curl -sf http://localhost:5011/logs?limit=5 2>&1 || echo "CURL_FAILED")
          echo "Response: $RESPONSE"
          if echo "$RESPONSE" | grep -q '"data"'; then
            COUNT=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('total_records',0))" 2>/dev/null || echo "parse_error")
            echo "✅ /logs returned data. total_records=$COUNT"
          else
            echo "❌ /logs returned unexpected response. Dumping backend logs:"
            docker compose -f docker-compose.test.yml logs backend --tail=50
            exit 1
          fi

      - name: Run Playwright E2E tests
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:5012
        run: npm run test:e2e

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

      - name: Upload screenshots and videos on failure
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-results
          path: frontend/playwright-results/
          retention-days: 7

      - name: Stop test stack
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  # 📊 Final Summary
  quality-gate-summary:
    name: 📊 LEGO Quality Gate Summary
    runs-on: ubuntu-latest
    needs: [discover-changes, lint-frontend, lint-backend, lint-workflows, quality-frontend, quality-backend, safety-security-check, codecov-upload-frontend, codecov-upload-backend, build-test-backend, build-test-frontend, e2e-tests]
    if: always()

    steps:
      - name: 🎯 Post Quality Gate Results
        uses: actions/github-script@v9
        with:
          script: |
            const needs = ${{ toJson(needs) }};
            const linesChanged = needs['discover-changes'].outputs['lines-changed'];
            
            // Determine overall status
            let allPassed = true;
            let results = [];
            
            // Check each job result
            Object.entries(needs).forEach(([job, result]) => {
              if (job === 'discover-changes') return;
              
              const jobNames = {
                'lint-frontend': '🎨 Frontend Linting',
                'lint-backend': '🐍 Backend Linting',
                'lint-workflows': '🔧 Workflow Linting',
                'quality-frontend': '✨ Frontend Quality',
                'quality-backend': '✨ Backend Quality',
                'safety-security-check': '🛡️ Safety Security Scan',
                'codecov-upload-frontend': '📊 Frontend Code Coverage',
                'codecov-upload-backend': '📊 Backend Code Coverage',
                'build-test-backend': '🐳 Backend Docker Build',
                'build-test-frontend': '🐳 Frontend Docker Build',
                'e2e-tests': '🎭 E2E Tests (Playwright)'
              };
              
              if (result.result === 'failure') {
                allPassed = false;
                results.push(`❌ ${jobNames[job] || job}: Failed`);
              } else if (result.result === 'success') {
                results.push(`✅ ${jobNames[job] || job}: Passed`);
              } else if (result.result === 'skipped') {
                results.push(`⏭️ ${jobNames[job] || job}: Skipped (no changes)`);
              }
            });
            
            const status = allPassed ? "🎉 **Ready to Build!**" : "🔧 **Needs Attention**";
            const emoji = allPassed ? "🏗️" : "⚠️";
            
            const comment = `## ${emoji} LEGO Quality Gate Results
            
            ${status}
            
            ### 📋 Build Plan Results (${linesChanged} lines changed):
            ${results.join('\n')}
            
            ${allPassed ? 
              "### 🎊 All Quality Checks Passed!\nYour LEGO pieces fit perfectly together! The PR is ready for review and can be merged to trigger the production build." : 
              "### 🔧 Quality Issues Detected\nSome LEGO pieces need adjustment before they can fit together properly. Please check the failed jobs above and fix the issues."
            }
            
            ---
            *Built with ❤️ using the LEGO methodology - every piece matters!* 🧱`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
# All dependencies successfully consolidated and tested
