# Backend Deployment — NextDNS Optimized Analytics
#
# Runs the FastAPI/uvicorn API server.
# Migrations are handled by migration-job.yaml (run it first!).
#
# CHANGE: Update the image tag before applying.
# The secret 'nextdns-analytics-backend-env' must already exist
# (see secrets-template.yaml or the README for options).
#
# Apply:
#   kubectl apply -f k8s/backend-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextdns-analytics-backend
  namespace: nextdns-analytics
  labels:
    app.kubernetes.io/name: nextdns-analytics
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nextdns-analytics
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nextdns-analytics
        app.kubernetes.io/component: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
      - name: backend
        # CHANGE: set the image tag to the version you want to deploy
        image: maboni82/nextdns-optimized-analytics-backend:<IMAGE_TAG>
        imagePullPolicy: Always
        command:
          - "uvicorn"
          - "main:app"
          - "--host"
          - "0.0.0.0"
          - "--port"
          - "5000"
          - "--log-level"
          - "info"
        ports:
        - name: http
          containerPort: 5000
          protocol: TCP
        env:
        # Worker pod handles the scheduler — disable it in the API pods
        - name: DISABLE_SCHEDULER
          value: "true"
        # CHANGE: set to match the deployed image tag (e.g. 26.x.xx)
        - name: APP_VERSION
          value: "<IMAGE_TAG>"
        envFrom:
        - secretRef:
            name: nextdns-analytics-backend-env
        livenessProbe:
          # TCP check avoids an expensive DB COUNT(*) on every liveness tick
          tcpSocket:
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 15
          periodSeconds: 15
          timeoutSeconds: 15
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 15
          failureThreshold: 18
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
