# Secret Template — NextDNS Optimized Analytics
#
# This file is a TEMPLATE only.
# Fill in the placeholder values below, then apply with:
#   kubectl apply -f k8s/secrets-template.yaml
#
# WARNING: Never commit this file with real credentials.
#          Add it to .gitignore or use a secrets manager in production.
#
# Alternatively, create the secret with kubectl directly:
#   kubectl create secret generic nextdns-analytics-backend-env \
#     --namespace nextdns-analytics \
#     --from-literal=POSTGRES_USER=<value> \
#     ... (see README.md for the full command)
apiVersion: v1
kind: Secret
metadata:
  name: nextdns-analytics-backend-env
  namespace: nextdns-analytics
  labels:
    app.kubernetes.io/name: nextdns-analytics
    app.kubernetes.io/component: backend
type: Opaque
stringData:
  # ── Database ─────────────────────────────────────────────────────────────
  POSTGRES_USER: "nextdns"
  POSTGRES_PASSWORD: "<your-db-password>"
  POSTGRES_DB: "nextdns"
  POSTGRES_HOST: "<your-db-host>"
  POSTGRES_PORT: "5432"
  PGSSLMODE: "require"

  # ── NextDNS API ───────────────────────────────────────────────────────────
  API_KEY: "<your-nextdns-api-key>"
  PROFILE_IDS: "<profile1,profile2>"

  # ── Local API auth ────────────────────────────────────────────────────────
  LOCAL_API_KEY: "<your-local-api-key>"

  # ── Fetch settings ────────────────────────────────────────────────────────
  LOG_LEVEL: "info"
  FETCH_INTERVAL: "60"
  FETCH_LIMIT: "1000"

  # ── UI authentication ─────────────────────────────────────────────────────
  AUTH_ENABLED: "true"
  AUTH_USERNAME: "admin"
  AUTH_PASSWORD: "<your-admin-password>"
  AUTH_SECRET_KEY: "<your-jwt-secret-key>"
  AUTH_SESSION_TIMEOUT: "3600"

  # ── CORS ──────────────────────────────────────────────────────────────────
  ALLOWED_ORIGINS: "https://<YOUR_DOMAIN>"
