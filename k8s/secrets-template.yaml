# Secrets Template — NextDNS Optimized Analytics
#
# This file is a TEMPLATE only. Do NOT commit real credentials.
#
# Option A — Infisical Operator (recommended for production clusters)
# ─────────────────────────────────────────────────────────────────
# Requires the Infisical Operator to be installed in your cluster.
# The operator watches InfisicalSecret CRs and syncs the secret automatically.
#
# CHANGE: Set identityId and envSlug for your environment.
#
# Apply:
#   kubectl apply -f k8s/secrets-template.yaml
#
# Option B — Manual kubectl secret (development / testing only)
# ─────────────────────────────────────────────────────────────
# See k8s/README.md for the full kubectl create secret command.
# Never commit a file containing real secret values.
#
# ─────────────────────────────────────────────────────────────
# OPTION A: InfisicalSecret CR (remove this section if using Option B)
# ─────────────────────────────────────────────────────────────
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: nextdns-analytics-backend-secret
  namespace: nextdns-analytics
  labels:
    app.kubernetes.io/name: nextdns-analytics
    app.kubernetes.io/component: backend
spec:
  authentication:
    kubernetesAuth:
      autoCreateServiceAccountToken: true
      # CHANGE: your Infisical Machine Identity ID
      identityId: "<INFISICAL_IDENTITY_ID>"
      secretsScope:
        # CHANGE: your Infisical environment slug (e.g. "dev" or "prod")
        envSlug: "<ENV_SLUG>"
        # CHANGE: your Infisical project slug
        projectSlug: "<INFISICAL_PROJECT_SLUG>"
        secretsPath: "/"
      serviceAccountRef:
        name: infisical-service-account
        namespace: nextdns-analytics
  hostAPI: "https://eu.infisical.com/api"
  managedKubeSecretReferences:
  - creationPolicy: Owner
    # This secret name is referenced by backend-deployment.yaml and migration-job.yaml
    secretName: nextdns-analytics-backend-env
    secretNamespace: nextdns-analytics
    secretType: Opaque
    template:
      includeAllSecrets: true
  resyncInterval: 30
