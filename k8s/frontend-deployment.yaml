# Frontend Deployment — NextDNS Optimized Analytics
#
# Runs the React SPA served by nginx.
# Requires frontend-configmap.yaml to be applied first.
#
# CHANGE: Update the image tag before applying.
#
# Apply:
#   kubectl apply -f k8s/frontend-configmap.yaml
#   kubectl apply -f k8s/frontend-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextdns-analytics-frontend
  namespace: nextdns-analytics
  labels:
    app.kubernetes.io/name: nextdns-analytics
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nextdns-analytics
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nextdns-analytics
        app.kubernetes.io/component: frontend
    spec:
      # Frontend uses the nginx image which handles non-root internally
      securityContext: {}
      containers:
      - name: frontend
        # CHANGE: set the image tag to the version you want to deploy
        image: maboni82/nextdns-optimized-analytics-frontend:<IMAGE_TAG>
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 10
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        securityContext: {}
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        - name: tmp
          mountPath: /tmp
        - name: nginx-cache
          mountPath: /var/cache/nginx
        - name: nginx-run
          mountPath: /var/run
      volumes:
      - name: nginx-config
        configMap:
          name: nextdns-analytics-nginx-config
      - name: tmp
        emptyDir: {}
      - name: nginx-cache
        emptyDir: {}
      - name: nginx-run
        emptyDir: {}
