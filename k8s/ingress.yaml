# Ingress — NextDNS Optimized Analytics
#
# Routes external traffic to the frontend (UI + API proxy).
# Requires cert-manager with a ClusterIssuer named 'letsencrypt-prod'.
#
# Traffic flow:
#   Internet → Ingress → nextdns-analytics-frontend:80
#                         └── /api/* → nextdns-analytics-backend:5000 (via nginx proxy)
#
# CHANGE: Replace <YOUR_DOMAIN> and <TLS_SECRET_NAME> before applying.
# Example:
#   <YOUR_DOMAIN>      → nextdns.example.com
#   <TLS_SECRET_NAME>  → nextdns-tls
#
# Apply:
#   kubectl apply -f k8s/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nextdns-analytics
  namespace: nextdns-analytics
  labels:
    app.kubernetes.io/name: nextdns-analytics
  annotations:
    # cert-manager will provision a Let's Encrypt certificate automatically
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Basic rate limiting via nginx ingress controller
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - <YOUR_DOMAIN>       # CHANGE: your public hostname
      secretName: <TLS_SECRET_NAME>   # CHANGE: cert-manager will create this
  rules:
    - host: <YOUR_DOMAIN>     # CHANGE: must match the TLS host above
      http:
        paths:
          # All traffic goes to the frontend — nginx proxies /api/ to backend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nextdns-analytics-frontend
                port:
                  name: http
