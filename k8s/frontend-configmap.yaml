# Frontend Nginx ConfigMap — NextDNS Optimized Analytics
#
# Provides nginx.conf for the frontend container.
# The /api/ path is proxied to the backend ClusterIP service.
#
# Apply before the frontend Deployment:
#   kubectl apply -f k8s/frontend-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: nextdns-analytics-nginx-config
  namespace: nextdns-analytics
  labels:
    app.kubernetes.io/name: nextdns-analytics
    app.kubernetes.io/component: frontend
data:
  nginx.conf: |
    # Nginx configuration for NextDNS Analytics frontend
    # Serves the React SPA and proxies /api/ to the backend k8s service.
    worker_processes auto;
    error_log /var/log/nginx/error.log notice;

    # PID file location for non-root user
    pid /tmp/nginx.pid;

    events {
        worker_connections 1024;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for"';

        access_log /var/log/nginx/access.log main;

        sendfile on;
        tcp_nopush on;
        keepalive_timeout 65;

        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;

        server {
            listen 8080;
            server_name localhost;
            root /usr/share/nginx/html;
            index index.html;

            # Handle React Router client-side routing
            location / {
                try_files $uri $uri/ /index.html;
            }

            # API proxy to backend k8s service
            # Service name matches services.yaml: nextdns-analytics-backend
            location /api/ {
                proxy_pass http://nextdns-analytics-backend:5000/;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            # Security headers
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "no-referrer-when-downgrade" always;

            # Cache static assets aggressively (content-hashed filenames)
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }
    }
